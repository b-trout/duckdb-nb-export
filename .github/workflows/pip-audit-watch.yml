name: pip-audit watch

# Scheduled monitoring for dependency vulnerabilities: pip-audit otherwise
# only runs as a pre-commit hook inside ci.yml's lint job, which means it
# only ever executes when a pull request happens to run. During idle
# periods with no PR activity, a newly disclosed CVE in a locked dependency
# produces no signal at all until the next PR. This mirrors
# assumption-watch.yml's pattern (weekly run against the current lockfile,
# file/update a GitHub issue on failure) applied to pip-audit instead of the
# assumptions test marker.

on:
  schedule:
    # Weekly, Monday 06:00 JST (Sunday 21:00 UTC). Same slot as
    # assumption-watch.yml; the two jobs are independent and don't share
    # runners, so running them at the same time is fine.
    - cron: "0 21 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --python 3.11 --group dev

      - name: Run pip-audit against the locked dependency set
        # Same invocation as the pip-audit pre-commit hook
        # (.pre-commit-config.yaml), so this reports exactly what would
        # have been caught locally or in a PR's lint job.
        id: audit
        shell: bash
        run: |
          # Explicit "shell: bash" makes this run under -e -o pipefail, so
          # the pipeline must be guarded with set +e -- otherwise a
          # pip-audit failure aborts the step before it can be recorded.
          set +e
          uv run pip-audit 2>&1 | tee pip-audit-output.txt
          code="${PIPESTATUS[0]}"
          set -e
          exit "$code"

      - name: File or update vulnerability issue
        # Guard on the pip-audit step specifically: a checkout/setup
        # failure is CI trouble, not a dependency vulnerability, and must
        # not file a vulnerability issue.
        if: failure() && steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try {
              output = fs.readFileSync('pip-audit-output.txt', 'utf8');
            } catch {}
            // Keep the tail; pip-audit prints the vulnerability table last.
            output = output.slice(-6000);

            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/` +
              `${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The scheduled `pip-audit` run found one or more known',
              'vulnerabilities in the currently locked dependency set',
              '(`uv.lock`).',
              '',
              'This runs the same check as the `pip-audit` pre-commit hook',
              '(`.pre-commit-config.yaml`), but on a weekly schedule instead',
              'of only when a pull request happens to run it, so a newly',
              'disclosed CVE is caught even during idle periods with no PR',
              'activity.',
              '',
              'Update the affected package (Dependabot may already have a',
              'pending PR for it) and re-run `uv run pip-audit` locally to',
              'confirm the finding is resolved.',
              '',
              `Workflow run: ${runUrl}`,
              '',
              '<details><summary>pip-audit output (tail)</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependency-vulnerability',
            });

            // The issues list endpoint also returns pull requests; a PR
            // carrying the label must not swallow the notification.
            const drift = issues.filter((i) => !i.pull_request);

            // NOTE: the `dependency-vulnerability` label is expected to
            // already exist on the repo (created once, manually -- see
            // issue #63 and the final task report). issues.create with a
            // label that doesn't exist yet fails the whole call with a 422
            // rather than silently creating the label, so retry once
            // without labels instead of losing the issue entirely.
            if (drift.length > 0) {
              // Already reported and still open: append this run instead
              // of piling up duplicate issues week after week.
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: drift[0].number,
                body,
              });
            } else {
              try {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'pip-audit found a dependency vulnerability',
                  body,
                  labels: ['dependency-vulnerability'],
                });
              } catch (error) {
                if (error.status !== 422) {
                  throw error;
                }
                core.warning(
                  'Creating the issue with the "dependency-vulnerability" ' +
                  'label failed (422); the label may not exist yet on this ' +
                  'repo. Filing without a label instead.'
                );
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'pip-audit found a dependency vulnerability',
                  body,
                });
              }
            }
