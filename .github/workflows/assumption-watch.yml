name: Assumption watch

# Scheduled monitoring for upstream drift (test design doc 7.4 節): runs the
# assumptions marker (AT-*) against the newest duckdb release even when no
# commits are being pushed, and files/updates a GitHub issue on failure.
# This complements ci.yml, where the same tests run per-PR with
# continue-on-error on the latest-duckdb legs: there, a failure is only a
# yellow warning nobody is notified about, and it never fires at all while
# development is idle -- exactly when a new duckdb release is most likely
# to land unnoticed.

on:
  schedule:
    # Weekly, Monday 06:00 JST (Sunday 21:00 UTC).
    - cron: "0 21 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  assumptions-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --python 3.11 --group dev

      - name: Upgrade duckdb to the newest PyPI release
        # "uv run --with duckdb" (ci.yml's latest-leg technique) is not
        # usable here: an unconstrained --with requirement is already
        # satisfied by the locked duckdb in the project environment, so uv
        # reuses the locked version instead of resolving the newest release.
        # Upgrading the synced environment in place and then running with
        # --no-sync (so uv run does not restore uv.lock) guarantees the
        # newest PyPI release is actually under test.
        id: duckdb
        shell: bash
        run: |
          uv pip install --upgrade duckdb
          version="$(uv run --no-sync python -c 'import duckdb; print(duckdb.__version__)')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Testing against duckdb $version"

      - name: Run assumption tests against latest duckdb
        id: assumptions
        shell: bash
        run: |
          # Explicit "shell: bash" makes this run under -e -o pipefail, so
          # the pipeline must be guarded with set +e -- otherwise a pytest
          # failure aborts the step before the exit-code-5 check can run.
          set +e
          uv run --no-sync pytest -m assumptions --tb=short 2>&1 \
            | tee assumption-output.txt
          code="${PIPESTATUS[0]}"
          set -e
          # Exit code 5 means no tests were collected; don't treat as drift.
          if [ "$code" -eq 5 ]; then
            exit 0
          fi
          exit "$code"

      - name: File or update drift issue
        # Guard on the pytest step specifically: a checkout/setup failure is
        # CI trouble, not upstream drift, and must not file a drift issue.
        if: failure() && steps.assumptions.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try {
              output = fs.readFileSync('assumption-output.txt', 'utf8');
            } catch {}
            // Keep the tail; pytest prints the summary last.
            output = output.slice(-6000);

            const duckdbVersion =
              ${{ toJSON(steps.duckdb.outputs.version) }} || 'unknown';

            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/` +
              `${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The scheduled assumption-test run (`pytest -m assumptions`)',
              `failed against \`duckdb ${duckdbVersion}\` (the newest PyPI release).`,
              '',
              'Per the test design doc (6章 運用注記), this is not an',
              'implementation bug: it signals that an upstream change',
              'invalidated a documented design assumption (design doc 6.3節).',
              'The follow-up is a design doc / ADR review, and possibly a',
              'reader/executor adjustment plus fixture regeneration.',
              '',
              `Workflow run: ${runUrl}`,
              '',
              '<details><summary>pytest output (tail)</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'assumption-drift',
            });

            // The issues list endpoint also returns pull requests; a PR
            // carrying the label must not swallow the notification.
            const drift = issues.filter((i) => !i.pull_request);

            if (drift.length > 0) {
              // Drift already reported: append this run instead of piling
              // up duplicate issues week after week.
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: drift[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title:
                  'Assumption tests failed against the latest duckdb release',
                body,
                labels: ['assumption-drift'],
              });
            }
