name: Publish

# Trigger on version tags (real release, TestPyPI + PyPI) and manual
# dispatch (rehearsal only, TestPyPI). Manual dispatch never reaches the
# `pypi` job, so it cannot accidentally publish a production release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/duckdb-nb-export
    permissions:
      # Required for PyPI Trusted Publishing (OIDC); no API token is used.
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    name: Publish to PyPI
    # Only a tag push may reach production; workflow_dispatch stops at the
    # testpypi job above, so manual runs can never publish to PyPI.
    if: github.event_name == 'push'
    needs: testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/duckdb-nb-export
    permissions:
      # Required for PyPI Trusted Publishing (OIDC); no API token is used.
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
